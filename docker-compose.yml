services:
  # The Game Logic
  backend:
    image: node:20-alpine
    restart: always
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 1.5G
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    command: npm run start

  # The High-Speed Cache
  redis:
    image: redis:alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 1G

  # The Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html      # <--- REQUIRED: This maps your code to Nginx
