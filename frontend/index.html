<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenFront Remake - Alpha</title>
    <script src="https://pixijs.download/release/pixi.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
        #victoryModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #victoryModal.show {
            display: flex;
        }
        #modalContent {
            background: #1a1a1a;
            border: 3px solid #4CAF50;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: white;
            font-family: sans-serif;
            min-width: 400px;
        }
        #modalContent h2 {
            font-size: 2.5em;
            margin: 0 0 20px 0;
            color: #4CAF50;
        }
        #modalContent p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        #modalContent button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        #modalContent button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="victoryModal">
        <div id="modalContent">
            <h2 id="modalTitle">VICTORY!</h2>
            <p id="modalStats"></p>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>
    <div id="controls" style="position:absolute;top:10px;right:10px;z-index:100;background:rgba(0,0,0,0.45);padding:8px;border-radius:8px;">
      <button id="startBtn">Start Match (Choose Start Tile)</button>
      <button id="toggleAuto">Auto-Refresh: ON</button><br/>
      <div style="color:#fff;margin-top:4px;font-size:12px;">Start tile: <span id="startTile">0,0</span> (click neutral tile to set)</div>
            <div style="color:#fff;margin-top:2px;font-size:12px;">Map: <span id="mapDims">-</span> | Zoom: <span id="zoomValue">1.00x</span></div>
      <label style="font-size:12px;color:#fff;">Troop Ratio: <span id="ratioValue">80%</span></label><br/>
      <input id="ratioSlider" type="range" min="10" max="90" value="80" style="width:150px;" />
    </div>
    <div id="ui"><h1>OpenFront Alpha</h1><p>Left-click your tile, then click any land target to send troops. Shift+click to build City (125 gold).</p><p id="stats">Connecting...</p></div>
    <script>
        const app = new PIXI.Application();
        
        async function init() {
            await app.init({ 
                width: window.innerWidth, 
                height: window.innerHeight, 
                backgroundColor: 0x1099bb,
                resizeTo: window 
            });
            document.body.appendChild(app.canvas);

            const tileSize = 0.6;
            const tileGap = 0;
            const outlineWidth = Math.max(0.4, tileSize * 0.5);
            const maxZoom = 24;
            const mapContainer = new PIXI.Container();
            app.stage.addChild(mapContainer);

            let camera = { x: 0, y: 0, speed: 8 };
            let zoom = 1;
            let mapPixelWidth = 1;
            let mapPixelHeight = 1;
            let hasInitializedView = false;
            mapContainer.scale.set(zoom);

            function getMinZoom() {
                return Math.min(window.innerWidth / mapPixelWidth, window.innerHeight / mapPixelHeight);
            }

            function clampZoom(nextZoom) {
                const minZoom = getMinZoom();
                return Math.min(maxZoom, Math.max(minZoom, nextZoom));
            }

            function clampCamera() {
                const scaledW = mapPixelWidth * zoom;
                const scaledH = mapPixelHeight * zoom;
                if (scaledW >= window.innerWidth) {
                    camera.x = Math.min(0, Math.max(window.innerWidth - scaledW, camera.x));
                } else {
                    camera.x = (window.innerWidth - scaledW) / 2;
                }
                if (scaledH >= window.innerHeight) {
                    camera.y = Math.min(0, Math.max(window.innerHeight - scaledH, camera.y));
                } else {
                    camera.y = (window.innerHeight - scaledH) / 2;
                }
            }

            function fitMapInView() {
                zoom = clampZoom(zoom);
                mapContainer.scale.set(zoom);
                camera.x = (window.innerWidth - mapPixelWidth * zoom) / 2;
                camera.y = (window.innerHeight - mapPixelHeight * zoom) / 2;
                clampCamera();
                mapContainer.x = camera.x;
                mapContainer.y = camera.y;
                const zoomLabel = document.getElementById('zoomValue');
                if (zoomLabel) zoomLabel.textContent = `${zoom.toFixed(2)}x`;
            }

            window.addEventListener('resize', () => {
                if (!mapPixelWidth || !mapPixelHeight) return;
                fitMapInView();
            });

            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = app.canvas.getBoundingClientRect();
                const cursorX = e.clientX - rect.left;
                const cursorY = e.clientY - rect.top;

                const oldZoom = zoom;
                const worldX = (cursorX - camera.x) / oldZoom;
                const worldY = (cursorY - camera.y) / oldZoom;

                zoom = clampZoom(zoom - e.deltaY * 0.0016);
                camera.x = cursorX - worldX * zoom;
                camera.y = cursorY - worldY * zoom;
                clampCamera();
                mapContainer.scale.set(zoom);
                mapContainer.x = camera.x;
                mapContainer.y = camera.y;
                const zoomLabel = document.getElementById('zoomValue');
                if (zoomLabel) zoomLabel.textContent = `${zoom.toFixed(2)}x`;
            }, { passive: false });

            app.view.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                dragging = true;
                dragStart = { x: e.clientX, y: e.clientY, camX: camera.x, camY: camera.y };
            });
            app.view.addEventListener('pointermove', (e) => {
                if (!dragging || !dragStart) return;
                camera.x = dragStart.camX + (e.clientX - dragStart.x);
                camera.y = dragStart.camY + (e.clientY - dragStart.y);
                clampCamera();
            });
            app.view.addEventListener('pointerup', () => { dragging = false; });
            app.view.addEventListener('pointerleave', () => { dragging = false; });
            const keys = {};

            window.addEventListener("keydown", e => keys[e.code] = true);
            window.addEventListener("keyup", e => keys[e.code] = false);

            app.ticker.add(() => {
                if (keys['KeyW'] || keys['ArrowUp']) camera.y += camera.speed;
                if (keys['KeyS'] || keys['ArrowDown']) camera.y -= camera.speed;
                if (keys['KeyA'] || keys['ArrowLeft']) camera.x += camera.speed;
                if (keys['KeyD'] || keys['ArrowRight']) camera.x -= camera.speed;
                clampCamera();
                mapContainer.x = camera.x;
                mapContainer.y = camera.y;
            });

            const terrainColors = {
                plains:      0x4a9e5c,   // green
                desert:      0xc8a850,   // sandy yellow
                mountain:    0x8a8a8a,   // grey
                water:       0x1a66aa,   // ocean blue
                radioactive: 0x39ff14,   // neon green
                snow:        0xe8eaf0    // near-white
            };

            let mapTiles = [];  // now stores tile-data objects, not PIXI.Graphics
            let selected = null;
            let startPosition = { x: 0, y: 0 };
            let pretendStart = true;
            let gameState = { win: false, player: { eliminated: false } };
            let dragging = false;
            let dragStart = null;

            // ── Flat-layer rendering state (persists across refreshes) ────────
            let mapInitialized = false;
            let mapWidth = 0;
            let mapHeight = 0;
            let terrainGfx = null;   // drawn once; never changes
            let ownerGfx = null;     // redrawn when ownership changes
            let buildingGfx = null;  // redrawn when buildings change
            let hoverGfx = null;     // single-tile hover highlight
            let selectionGfx = null; // selection + start-position outlines
            let lastHoverTile = null;
            let clientTick = 0;      // server tick we last synced to
            let localMapData = null; // client-side copy maintained by refreshMapForInterval

            function drawUI(text) {
                const ui = document.getElementById('ui');
                ui.innerHTML = `<h1>OpenFront Alpha</h1><p>${text}</p><p id="msg"></p>`;
            }

            function showVictoryModal(player, stats, scoreboard) {
                const modal = document.getElementById('victoryModal');
                const title = document.getElementById('modalTitle');
                const statsText = document.getElementById('modalStats');
                if (player.eliminated) {
                    title.textContent = 'DEFEATED!';
                    title.style.color = '#ff4d4f';
                    statsText.innerHTML = `<p>You have been eliminated.</p><p>Final Control: ${stats.controlPct}%</p>`;
                } else {
                    title.textContent = 'VICTORY!';
                    title.style.color = '#4CAF50';
                    statsText.innerHTML = `<p>You control ${stats.controlPct}% of the map!</p><p>Population: ${player.pop.toLocaleString()}</p>`;
                }
                if (scoreboard && scoreboard.length > 0) {
                    let tbl = '<table style="width:100%;margin-top:20px;border-collapse:collapse;font-size:0.88em;">';
                    tbl += '<thead><tr style="border-bottom:1px solid #555;"><th style="text-align:left;padding:4px 8px;">#</th><th style="text-align:left;padding:4px 8px;">Player</th><th style="text-align:right;padding:4px 8px;">Land%</th><th style="text-align:right;padding:4px 8px;">Troops</th><th style="text-align:right;padding:4px 8px;">Status</th></tr></thead><tbody>';
                    scoreboard.forEach((p, i) => {
                        const isMe = p.id === 'player1';
                        const rowStyle = isMe ? 'background:rgba(255,255,255,0.07);font-weight:bold;' : '';
                        const status = p.eliminated
                            ? '<span style="color:#ff4d4f;">Elim.</span>'
                            : '<span style="color:#4CAF50;">Active</span>';
                        const name = isMe ? 'You' : p.id;
                        tbl += `<tr style="${rowStyle}"><td style="padding:4px 8px;">${i+1}</td><td style="padding:4px 8px;">${name}</td><td style="text-align:right;padding:4px 8px;">${p.controlPct}%</td><td style="text-align:right;padding:4px 8px;">${p.troops.toLocaleString()}</td><td style="text-align:right;padding:4px 8px;">${status}</td></tr>`;
                    });
                    tbl += '</tbody></table>';
                    statsText.innerHTML += tbl;
                }
                modal.classList.add('show');
            }

            function hideVictoryModal() {
                const modal = document.getElementById('victoryModal');
                modal.classList.remove('show');
            }

            function updateStats(data) {
                if (!data || !data.player || !data.stats) return;
                const p = data.player;
                const s = data.stats;
                gameState.player = p;
                gameState.stats = s;
                gameState.scoreboard = data.scoreboard || [];
                gameState.win = s.controlPct >= 80;
                gameState.eliminated = p.eliminated;
                document.getElementById('stats').innerHTML =
                    `Pop: ${p.pop} (T:${p.troops} W:${p.workers}) | Gold: ${p.gold} | Cap: ${p.cap} | Control: ${s.controlPct}% | Orders: ${s.pendingAttacks || 0}`;
                document.getElementById('ratioValue').textContent = `${p.troopRatio}%`;
                document.getElementById('ratioSlider').value = String(p.troopRatio);
                if (p.eliminated) {
                    document.getElementById('stats').innerHTML += ' | ❌ ELIMINATED';
                } else if (s.controlPct >= 80) {
                    document.getElementById('stats').innerHTML += ' | ✅ VICTORY!';
                }
            }

            const startBtn = document.getElementById('startBtn');
            const toggleAutoBtn = document.getElementById('toggleAuto');
            const playAgainBtn = document.getElementById('playAgainBtn');
            let autoRefresh = true;

            startBtn.addEventListener('click', async () => {
                hideVictoryModal();
                drawUI('Starting match...');
                startBtn.disabled = true;
                try {
                    const response = await fetch('/api/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ startX: startPosition.x, startY: startPosition.y })
                    });
                    if (!response.ok) {
                        const err = await response.text();
                        throw new Error(err || 'Failed to start match');
                    }
                    pretendStart = false;
                    await renderCurrentMap();
                    drawUI(`Match started at ${startPosition.x},${startPosition.y}. Select a tile to attack.`);
                } catch (err) {
                    pretendStart = true;
                    drawUI(`Start failed: ${err.message}. Pick a start tile and try again.`);
                } finally {
                    startBtn.disabled = false;
                }
            });

            playAgainBtn.addEventListener('click', async () => {
                hideVictoryModal();
                await startBtn.click();
            });

            const ratioSlider = document.getElementById('ratioSlider');
            ratioSlider.addEventListener('input', async () => {
                const ratio = Number(ratioSlider.value);
                document.getElementById('ratioValue').textContent = `${ratio}%`;
                await fetch('/api/player/1/ratio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ratio })
                });
                await renderCurrentMap();
            });

            toggleAutoBtn.addEventListener('click', () => {
                autoRefresh = !autoRefresh;
                toggleAutoBtn.textContent = `Auto-Refresh: ${autoRefresh ? 'ON' : 'OFF'}`;
            });

            async function refreshMap() {
                const res = await fetch('/api/map');
                const data = await res.json();
                localMapData = data.map;
                clientTick = data.serverTick || 0;
                return data;
            }

            async function refreshMapForInterval() {
                if (!localMapData || clientTick === 0) return refreshMap();
                try {
                    const res = await fetch(`/api/map/diff?since=${clientTick}`);
                    const diff = await res.json();
                    if (diff.needsFullRefresh) return refreshMap();
                    for (const { x, y, tile } of (diff.changes || [])) {
                        if (localMapData[y] && localMapData[y][x]) localMapData[y][x] = tile;
                    }
                    clientTick = diff.serverTick || clientTick;
                    return { map: localMapData, player: diff.player, stats: diff.stats,
                             win: diff.win, scoreboard: diff.scoreboard };
                } catch (_) { return refreshMap(); }
            }

            // ── Rendering helpers ──────────────────────────────────
            function getLocalPos(e) {
                return e.data ? e.data.getLocalPosition(mapContainer) : e.getLocalPosition(mapContainer);
            }

            function redrawDynamicLayers() {
                ownerGfx.clear();
                buildingGfx.clear();
                for (let y = 0; y < mapHeight; y++) {
                    for (let x = 0; x < mapWidth; x++) {
                        const t = mapTiles[y][x];
                        if (t.owner !== 'neutral') {
                            const c = t.owner === 'player1' ? 0xff4d4f : 0x999999;
                            ownerGfx.beginFill(c, 0.25);
                            ownerGfx.drawRect(x * tileSize, y * tileSize, tileSize - tileGap, tileSize - tileGap);
                            ownerGfx.endFill();
                        }
                        if (t.building === 'city') {
                            buildingGfx.beginFill(0x333333);
                            buildingGfx.drawRect(x * tileSize + tileSize / 4, y * tileSize + tileSize / 4, tileSize / 2, tileSize / 2);
                            buildingGfx.endFill();
                        }
                    }
                }
            }

            function redrawSelectionLayer() {
                selectionGfx.clear();
                if (pretendStart) {
                    selectionGfx.lineStyle(outlineWidth, 0xffff00);
                    selectionGfx.drawRect(startPosition.x * tileSize, startPosition.y * tileSize, tileSize - tileGap, tileSize - tileGap);
                }
                if (selected) {
                    selectionGfx.lineStyle(outlineWidth, 0xffffff);
                    selectionGfx.drawRect(selected.x * tileSize, selected.y * tileSize, tileSize - tileGap, tileSize - tileGap);
                }
            }

            function initMap(mapRows) {
                mapContainer.removeChildren();
                mapHeight = mapRows.length;
                mapWidth  = mapRows[0] ? mapRows[0].length : 0;
                mapPixelHeight = mapHeight * tileSize;
                mapPixelWidth  = mapWidth  * tileSize;
                const mapDimsLabel = document.getElementById('mapDims');
                if (mapDimsLabel) mapDimsLabel.textContent = `${mapWidth}x${mapHeight}`;

                terrainGfx  = new PIXI.Graphics();
                ownerGfx    = new PIXI.Graphics();
                buildingGfx = new PIXI.Graphics();
                hoverGfx    = new PIXI.Graphics();
                selectionGfx= new PIXI.Graphics();
                mapContainer.addChild(terrainGfx, ownerGfx, buildingGfx, hoverGfx, selectionGfx);

                // Store tile data & draw terrain layer once (never redrawn)
                mapTiles = [];
                for (let y = 0; y < mapHeight; y++) {
                    mapTiles[y] = [];
                    for (let x = 0; x < mapWidth; x++) {
                        mapTiles[y][x] = mapRows[y][x];
                        const baseColor = terrainColors[mapRows[y][x].type] ?? terrainColors.plains;
                        terrainGfx.beginFill(baseColor);
                        terrainGfx.drawRect(x * tileSize, y * tileSize, tileSize - tileGap, tileSize - tileGap);
                        terrainGfx.endFill();
                    }
                }
                redrawDynamicLayers();
                redrawSelectionLayer();

                // Container-level pointer events (replaces 192,200 individual tile handlers)
                mapContainer.interactive = true;
                mapContainer.hitArea = new PIXI.Rectangle(0, 0, mapPixelWidth, mapPixelHeight);
                let pDownPos = null;

                mapContainer.on('pointermove', (e) => {
                    const local = getLocalPos(e);
                    const tx = Math.floor(local.x / tileSize);
                    const ty = Math.floor(local.y / tileSize);
                    if (tx < 0 || ty < 0 || tx >= mapWidth || ty >= mapHeight) {
                        hoverGfx.clear(); lastHoverTile = null; return;
                    }
                    if (lastHoverTile && lastHoverTile.x === tx && lastHoverTile.y === ty) return;
                    lastHoverTile = { x: tx, y: ty };
                    hoverGfx.clear();
                    hoverGfx.beginFill(0xffffff, 0.15);
                    hoverGfx.drawRect(tx * tileSize, ty * tileSize, tileSize - tileGap, tileSize - tileGap);
                    hoverGfx.endFill();
                    const tm = mapTiles[ty][tx];
                    const countryLabel = tm.country ? ` | ${tm.country}` : '';
                    drawUI(`Tile ${tx},${ty} | ${tm.type}${countryLabel} | owner: ${tm.owner}`);
                });

                mapContainer.on('pointerout', () => { hoverGfx.clear(); lastHoverTile = null; });

                mapContainer.on('pointerdown', (e) => {
                    pDownPos = { x: e.clientX, y: e.clientY };
                });

                mapContainer.on('pointerup', async (e) => {
                    if (!pDownPos) return;
                    const dx = e.clientX - pDownPos.x;
                    const dy = e.clientY - pDownPos.y;
                    pDownPos = null;
                    if (Math.sqrt(dx * dx + dy * dy) > 5) return; // drag — ignore

                    if (gameState.win || gameState.eliminated) {
                        drawUI('Game over. Press Start/Reset to play again.');
                        return;
                    }
                    const local = getLocalPos(e);
                    const x = Math.floor(local.x / tileSize);
                    const y = Math.floor(local.y / tileSize);
                    if (x < 0 || y < 0 || x >= mapWidth || y >= mapHeight) return;
                    const tileModel = mapTiles[y][x];

                    if (pretendStart) {
                        if (tileModel.type === 'water') { drawUI('Pick a land tile for your start position.'); return; }
                        if (tileModel.owner !== 'neutral') { drawUI('Pick a neutral tile for your start position.'); return; }
                        startPosition = { x, y };
                        document.getElementById('startTile').textContent = `${x},${y}`;
                        drawUI(`Start position selected at ${x},${y}. Click Start Match.`);
                        redrawSelectionLayer();
                        return;
                    }

                    if (e.shiftKey) {
                        if (tileModel.owner !== 'player1') { drawUI('You must own this tile to build.'); return; }
                        if (tileModel.building) { drawUI('Tile already has a building.'); return; }
                        const buildRes = await fetch('/building', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ x, y, player: 'player1', type: 'city' })
                        });
                        const buildData = await buildRes.json();
                        if (!buildRes.ok) { drawUI(`Build failed: ${buildData.error || 'unknown'}`); }
                        else { drawUI('City built!'); }
                        await renderCurrentMap();
                        return;
                    }

                    if (!selected) {
                        if (tileModel.owner !== 'player1') { drawUI('Select your own tile first.'); return; }
                        selected = { x, y, owner: tileModel.owner };
                        redrawSelectionLayer();
                        drawUI(`Selected ${x},${y}. Click any enemy/neutral land tile to send troops.`);
                        return;
                    }

                    if (selected.x === x && selected.y === y) {
                        selected = null;
                        redrawSelectionLayer();
                        drawUI('Selection cleared.');
                        return;
                    }

                    if (tileModel.type === 'water') { drawUI('Cannot attack water tiles.'); return; }

                    const attackRes = await fetch('/api/action/attack', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fromX: selected.x, fromY: selected.y, toX: x, toY: y, player: 'player1' })
                    });
                    const result = await attackRes.json();
                    if (!attackRes.ok) { drawUI(`Attack failed: ${result.error || 'unknown'}`); }
                    else { drawUI(result.message); }
                    selected = null;
                    await renderCurrentMap();
                });

                mapInitialized = true;
                if (!hasInitializedView) {
                    fitMapInView();
                    hasInitializedView = true;
                } else if (zoom < getMinZoom()) {
                    fitMapInView();
                }
            }

            // drawMap: first call initialises layers; subsequent calls only update what changed
            function drawMap(mapRows) {
                if (!mapInitialized) { initMap(mapRows); return; }
                let anyChange = false;
                for (let y = 0; y < mapHeight; y++) {
                    for (let x = 0; x < mapWidth; x++) {
                        const n = mapRows[y][x];
                        const o = mapTiles[y][x];
                        if (n.owner !== o.owner || n.building !== o.building) {
                            mapTiles[y][x] = n;
                            anyChange = true;
                        }
                    }
                }
                if (anyChange) {
                    redrawDynamicLayers();
                    redrawSelectionLayer();
                }
            }

            async function renderCurrentMap() {
                const data = await refreshMap();
                drawMap(data.map);
                updateStats({ player: data.player, stats: data.stats, scoreboard: data.scoreboard });
                return data;
            }

            setInterval(async () => {
                if (!autoRefresh) return;
                const data = await refreshMapForInterval();
                drawMap(data.map);
                updateStats({ player: data.player, stats: data.stats, scoreboard: data.scoreboard });
                if (gameState.win || gameState.eliminated) {
                    showVictoryModal(gameState.player, gameState.stats, gameState.scoreboard);
                    autoRefresh = false;
                }
            }, 2500);

            await renderCurrentMap();
        }
        init();
    </script>
</body>
</html>
